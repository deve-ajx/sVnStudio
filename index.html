<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Portfolio Builder</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0b1220;
    color: white;
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.panel {
    width: 35%;
    background: #0f172a;
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid #1e293b;
}

h2 {
    color: #38bdf8;
    margin-bottom: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #1e293b;
    background: #111827;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

/* RIGHT PREVIEW */
.preview {
    width: 65%;
    overflow-y: auto;
    padding: 40px;
}

/* PORTFOLIO STYLE */
.hero {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #1e293b;
}

.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #38bdf8;
}

.name {
    font-size: 28px;
    font-weight: 700;
}

.role {
    color: #94a3b8;
}

.section {
    margin-top: 25px;
}

.section h3 {
    color: #38bdf8;
    margin-bottom: 10px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    border: 1px solid #1e293b;
}

.tag {
    display: inline-block;
    background: #0ea5e9;
    padding: 5px 10px;
    margin: 3px;
    border-radius: 6px;
    font-size: 12px;
}

.small {
    color: #94a3b8;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- INPUT PANEL -->
<div class="panel">
<h2>Pro Portfolio Builder</h2>

<input id="name" placeholder="Full Name">
<input id="role" placeholder="Role (e.g. Frontend Developer)">
<textarea id="bio" placeholder="Short Bio"></textarea>

<input id="skills" placeholder="Skills (comma separated)">
<textarea id="projects" placeholder="Projects (comma separated)"></textarea>

<input id="contact" placeholder="Email / Phone">

<input id="photo" type="file" accept="image/*">

<button onclick="generate()">Generate Portfolio</button>
<button onclick="download()">Download Portfolio</button>
</div>

<!-- PREVIEW -->
<div class="preview">
<div id="portfolio">

<!-- HERO -->
<div class="hero">
<img id="avatar" class="avatar" src="https://via.placeholder.com/90">
<div>
<div class="name" id="pName">Your Name</div>
<div class="role" id="pRole">Your Role</div>
</div>
</div>

<!-- BIO -->
<div class="section">
<h3>About Me</h3>
<p id="pBio" class="small">Your bio appears here...</p>
</div>

<!-- SKILLS -->
<div class="section">
<h3>Skills</h3>
<div id="pSkills"></div>
</div>

<!-- PROJECTS -->
<div class="section">
<h3>Projects</h3>
<div id="pProjects"></div>
</div>

<!-- CONTACT -->
<div class="section">
<h3>Contact</h3>
<p id="pContact" class="small"></p>
</div>

</div>
</div>

<script>

let imageBase64 = "";

document.getElementById("photo").addEventListener("change", function(e) {
    let reader = new FileReader();
    reader.onload = function() {
        imageBase64 = reader.result;
        document.getElementById("avatar").src = imageBase64;
    };
    reader.readAsDataURL(e.target.files[0]);
});

function generate() {
    document.getElementById("pName").innerText =
        document.getElementById("name").value || "Your Name";

    document.getElementById("pRole").innerText =
        document.getElementById("role").value || "Your Role";

    document.getElementById("pBio").innerText =
        document.getElementById("bio").value || "Your bio here...";

    document.getElementById("pContact").innerText =
        document.getElementById("contact").value;

    // Skills
    let skills = document.getElementById("skills").value.split(",");
    let skillsDiv = document.getElementById("pSkills");
    skillsDiv.innerHTML = "";
    skills.forEach(s => {
        if (s.trim()) {
            let span = document.createElement("span");
            span.className = "tag";
            span.innerText = s.trim();
            skillsDiv.appendChild(span);
        }
    });

    // Projects
    let projects = document.getElementById("projects").value.split(",");
    let projDiv = document.getElementById("pProjects");
    projDiv.innerHTML = "";

    projects.forEach(p => {
        if (p.trim()) {
            let div = document.createElement("div");
            div.className = "card";
            div.innerText = p.trim();
            projDiv.appendChild(div);
        }
    });
}

function download() {
    let html = document.getElementById("portfolio").outerHTML;

    let full = `
<!DOCTYPE html>
<html>
<head>
<title>My Portfolio</title>
<style>
body { font-family: Inter, sans-serif; background:#0b1220; color:white; padding:40px; }
.hero { display:flex; gap:20px; align-items:center; border-bottom:1px solid #1e293b; padding-bottom:20px; }
.avatar { width:90px; height:90px; border-radius:50%; }
.name { font-size:28px; font-weight:bold; }
.role { color:#94a3b8; }
.section { margin-top:25px; }
.card { background:#111827; padding:15px; border-radius:10px; margin-bottom:10px; }
.tag { background:#0ea5e9; padding:5px 10px; margin:3px; display:inline-block; border-radius:6px; }
</style>
</head>
<body>
${html}
</body>
</html>
`;

    let blob = new Blob([full], { type: "text/html" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "portfolio.html";
    a.click();
}
</script>

</body>
</html>
