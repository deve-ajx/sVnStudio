<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recharge & Data Store</title>

  <!-- CSS goes here -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      text-align: center;
      margin-bottom: 1rem;
      color: #4CAF50;
    }

    form label {
      display: block;
      margin: 0.5rem 0 0.2rem;
    }

    form input, form select {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 0.7rem;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    #status {
      margin-top: 1rem;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Buy Airtime & Data</h1>
    <form id="rechargeForm">
      <label for="network">Select Network:</label>
      <select id="network" required>
        <option value="">--Choose Network--</option>
        <option value="mtn">MTN</option>
        <option value="glo">GLO</option>
        <option value="airtel">Airtel</option>
        <option value="9mobile">9mobile</option>
      </select>

      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" placeholder="08012345678" required pattern="[0-9]{11}">

      <label for="amount">Amount (₦):</label>
      <input type="number" id="amount" placeholder="100" required min="50">

      <button type="submit">Pay & Recharge</button>
    </form>
    <div id="status"></div>
  </div>

  <!-- Paystack JS -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <!-- JS goes here -->
  <script>
    const form = document.getElementById('rechargeForm');
    const statusDiv = document.getElementById('status');

    // Replace with your Paystack public key
    const PAYSTACK_PUBLIC_KEY = "pk_test_xxxxxxxxxxxxxxxxxxxxx"; 

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const network = document.getElementById('network').value;
      const phone = document.getElementById('phone').value;
      const amount = parseInt(document.getElementById('amount').value) * 100; // Paystack expects kobo

      if(!network || !phone || !amount) {
        statusDiv.innerText = "Please fill all fields correctly.";
        return;
      }

      // Paystack Payment
      let handler = PaystackPop.setup({
        key: PAYSTACK_PUBLIC_KEY,
        email: "customer@example.com",
        amount: amount,
        currency: "NGN",
        ref: 'RC' + Math.floor((Math.random() * 1000000000) + 1),
        callback: function(response) {
          statusDiv.innerText = "Payment successful! Ref: " + response.reference;

          // Call your recharge API here (Peyflex, Vtpass, etc.)
          /*
          fetch('https://api.peyflex.com/vtu/recharge', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer YOUR_API_KEY',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              network: network,
              phone: phone,
              amount: amount / 100
            })
          })
          .then(res => res.json())
          .then(data => {
            statusDiv.innerText += "\nRecharge status: " + data.status;
          })
          .catch(err => {
            statusDiv.innerText += "\nError sending recharge: " + err;
          });
          */
        },
        onClose: function() {
          statusDiv.innerText = "Transaction was not completed.";
        }
      });

      handler.openIframe();
    });
  </script>
</body>
</html>
