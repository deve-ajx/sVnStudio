<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Generator</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    height: 100vh;
}

.container {
    display: flex;
    width: 100%;
}

.form {
    width: 35%;
    padding: 20px;
    background: #111827;
    overflow-y: auto;
}

.preview {
    width: 65%;
    padding: 20px;
    overflow-y: auto;
}

h2 {
    color: #38bdf8;
}

input, textarea {
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #1f2937;
    color: white;
}

button {
    background: #38bdf8;
    border: none;
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
}

button:hover {
    background: #0ea5e9;
}

.card {
    background: #1f2937;
    padding: 20px;
    border-radius: 10px;
}

.name {
    font-size: 28px;
    color: #38bdf8;
}

.section {
    margin-top: 15px;
}

.tag {
    display: inline-block;
    background: #0ea5e9;
    padding: 5px 10px;
    margin: 3px;
    border-radius: 5px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form">
<h2>Portfolio Builder</h2>

<input id="name" placeholder="Your Name">
<textarea id="bio" placeholder="Your Bio"></textarea>
<input id="skills" placeholder="Skills (comma separated)">
<textarea id="projects" placeholder="Projects (comma separated)"></textarea>
<input id="contact" placeholder="Contact (email / phone)">

<button onclick="generate()">Generate Portfolio</button>
<button onclick="downloadHTML()">Download Portfolio</button>
</div>

<!-- PREVIEW -->
<div class="preview">
<div id="output" class="card">
<h1 class="name">Your Name</h1>
<p>Your bio will appear here...</p>

<div class="section">
<h3>Skills</h3>
<div id="skillsOut"></div>
</div>

<div class="section">
<h3>Projects</h3>
<ul id="projectsOut"></ul>
</div>

<div class="section">
<h3>Contact</h3>
<p id="contactOut"></p>
</div>

</div>
</div>

</div>

<script>
function generate() {
    let name = document.getElementById("name").value;
    let bio = document.getElementById("bio").value;
    let skills = document.getElementById("skills").value.split(",");
    let projects = document.getElementById("projects").value.split(",");
    let contact = document.getElementById("contact").value;

    document.querySelector(".name").innerText = name || "Your Name";
    document.querySelector(".card p").innerText = bio || "Your bio will appear here...";

    let skillsOut = document.getElementById("skillsOut");
    skillsOut.innerHTML = "";
    skills.forEach(s => {
        if (s.trim()) {
            let span = document.createElement("span");
            span.className = "tag";
            span.innerText = s.trim();
            skillsOut.appendChild(span);
        }
    });

    let projectsOut = document.getElementById("projectsOut");
    projectsOut.innerHTML = "";
    projects.forEach(p => {
        if (p.trim()) {
            let li = document.createElement("li");
            li.innerText = p.trim();
            projectsOut.appendChild(li);
        }
    });

    document.getElementById("contactOut").innerText = contact;
}

function downloadHTML() {
    let content = document.getElementById("output").outerHTML;

    let fullPage = `
    <html>
    <head>
    <title>My Portfolio</title>
    <style>
        body { font-family: Arial; padding: 40px; background:#0f172a; color:white; }
        .card { background:#1f2937; padding:20px; border-radius:10px; }
        .name { color:#38bdf8; font-size:30px; }
        .tag { background:#0ea5e9; padding:5px 10px; margin:3px; display:inline-block; border-radius:5px; }
    </style>
    </head>
    <body>
        ${content}
    </body>
    </html>
    `;

    let blob = new Blob([fullPage], { type: "text/html" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "portfolio.html";
    a.click();
}
</script>

</body>
</html>
